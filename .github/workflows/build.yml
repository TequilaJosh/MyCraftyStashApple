# Compile check for the Apple targets on GitHub's macOS runners. Until real
# Mac hardware exists, this workflow IS the Apple compiler: every push must
# build for iOS (iPad) and Mac Catalyst. The Windows head is built/run
# locally during development.
name: build
on:
  push:
    branches: [main]
  pull_request:

jobs:
  apple:
    name: Compile (iOS + Mac Catalyst)
    # .NET for iOS 26.5 requires Xcode 26.5, which is macos-26's default
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workloads
        run: dotnet workload install maui-ios maui-maccatalyst

      - name: Build iOS (simulator, no signing)
        run: dotnet build MyCraftyStash/MyCraftyStash.csproj -f net10.0-ios -c Release

      - name: Build Mac Catalyst
        run: dotnet build MyCraftyStash/MyCraftyStash.csproj -f net10.0-maccatalyst -c Release
