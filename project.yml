# XcodeGen project definition. We keep the .xcodeproj out of git entirely -
# run `xcodegen generate` (locally on a Mac, or in CI) to produce it.
name: MyCraftyStash
options:
  bundleIdPrefix: com.silosoftwarecreations
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
targets:
  MyCraftyStash:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.silosoftwarecreations.mycraftystash
        PRODUCT_NAME: My Crafty Stash
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
        # iPad only on the touch side (Mac + iPad target; no iPhone layout yet)
        TARGETED_DEVICE_FAMILY: "2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
